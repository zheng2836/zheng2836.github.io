<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Super Mario Bros</title>
    <style>
        body {
            margin: 0;
            padding: 0;
            background-color: #5c94fc;
            overflow: hidden;
            font-family: 'Courier New', Courier, monospace;
            user-select: none;
        }
        #game-container {
            position: relative;
            width: 100vw;
            height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
        }
        canvas {
            image-rendering: pixelated;
            box-shadow: 0 0 20px rgba(0,0,0,0.5);
        }
        #ui {
            position: absolute;
            top: 20px;
            left: 20px;
            color: white;
            font-size: 20px;
            text-shadow: 2px 2px 0 #000;
            z-index: 10;
        }
        #controls-hint {
            position: absolute;
            bottom: 20px;
            left: 50%;
            transform: translateX(-50%);
            color: white;
            font-size: 16px;
            text-shadow: 1px 1px 0 #000;
            text-align: center;
            opacity: 0.8;
        }
    </style>
</head>
<body>
    <div id="game-container">
        <div id="ui">
            MARIO<br>
            <span id="score">000000</span><br><br>
            COINS<br>
            <span id="coins">00</span><br><br>
            WORLD<br>
            1-1<br><br>
            TIME<br>
            <span id="time">300</span>
        </div>
        <canvas id="gameCanvas"></canvas>
        <div id="controls-hint">
            ARROWS / WASD to Move & Jump<br>
            SPACE to Restart
        </div>
    </div>

    <script>
        const canvas = document.getElementById('gameCanvas');
        const ctx = canvas.getContext('2d');
        
        // Game constants
        const TILE_SIZE = 32;
        const GRAVITY = 0.5;
        const JUMP_FORCE = -10;
        const MOVE_SPEED = 4;
        const MAX_FALL_SPEED = 12;
        
        // Game state
        let score = 0;
        let coins = 0;
        let timeLeft = 300;
        let lastTime = 0;
        let timerInterval = null;
        let gameOver = false;
        let win = false;

        // Input handling
        const keys = {
            left: false,
            right: false,
            up: false,
            down: false
        };

        document.addEventListener('keydown', (e) => {
            if (e.code === 'ArrowLeft' || e.code === 'KeyA') keys.left = true;
            if (e.code === 'ArrowRight' || e.code === 'KeyD') keys.right = true;
            if (e.code === 'ArrowUp' || e.code === 'KeyW' || e.code === 'Space') {
                if (!keys.up && !player.jumping && !gameOver) {
                    player.velY = JUMP_FORCE;
                    player.jumping = true;
                }
                keys.up = true;
            }
            if (e.code === 'ArrowDown' || e.code === 'KeyS') keys.down = true;
            
            // Restart on space if game over
            if (e.code === 'Space' && (gameOver || win)) {
                resetGame();
            }
        });

        document.addEventListener('keyup', (e) => {
            if (e.code === 'ArrowLeft' || e.code === 'KeyA') keys.left = false;
            if (e.code === 'ArrowRight' || e.code === 'KeyD') keys.right = false;
            if (e.code === 'ArrowUp' || e.code === 'KeyW' || e.code === 'Space') keys.up = false;
            if (e.code === 'ArrowDown' || e.code === 'KeyS') keys.down = false;
        });

        // Level data (simple representation)
        // 0: air, 1: ground, 2: brick, 3: question block, 4: pipe left, 5: pipe right, 6: goomba, 7: coin, 8: flag pole, 9: castle
        const levelMap = [
            "                                                                                                    ",
            "                                                                                                    ",
            "                                                                                                    ",
            "                                                                                                    ",
            "                                                                                                    ",
            "                                                                                                    ",
            "      3   222   3                                                                                   ",
            "                                                                                                    ",
            "                  3   222   3                                                                       ",
            "                                                                                                    ",
            "                              45                                                                    ",
            "                6             45        6                                                           ",
            "1111111111111111111111111111111111111111111111111111111111111111111111111111111111111111111111111111",
            "1111111111111111111111111111111111111111111111111111111111111111111111111111111111111111111111111111"
        ];

        // Parse level
        let tiles = [];
        let enemies = [];
        let items = [];
        let particles = [];
        let flagX = 0;

        function parseLevel() {
            tiles = [];
            enemies = [];
            items = [];
            particles = [];
            
            for (let row = 0; row < levelMap.length; row++) {
                tiles[row] = [];
                for (let col = 0; col < levelMap[row].length; col++) {
                    const char = levelMap[row][col];
                    let tileType = 0;
                    
                    if (char === '1') tileType = 1; // ground
                    else if (char === '2') tileType = 2; // brick
                    else if (char === '3') tileType = 3; // question block
                    else if (char === '4') tileType = 4; // pipe left
                    else if (char === '5') tileType = 5; // pipe right
                    else if (char === '6') {
                        enemies.push({
                            x: col * TILE_SIZE,
                            y: row * TILE_SIZE,
                            width: TILE_SIZE,
                            height: TILE_SIZE,
                            velX: -1,
                            dead: false,
                            type: 'goomba'
                        });
                        tileType = 0;
                    }
                    else if (char === '7') {
                        items.push({
                            x: col * TILE_SIZE + TILE_SIZE/2,
                            y: row * TILE_SIZE + TILE_SIZE/2,
                            width: 20,
                            height: 20,
                            collected: false,
                            type: 'coin'
                        });
                        tileType = 0;
                    }
                    else if (char === '8') {
                        flagX = col * TILE_SIZE;
                        tileType = 8;
                    }
                    else if (char === '9') tileType = 9;
                    else tileType = 0;
                    
                    tiles[row][col] = tileType;
                }
            }
        }

        // Player object
        const player = {
            x: 100,
            y: 100,
            width: 28,
            height: 32,
            velX: 0,
            velY: 0,
            jumping: false,
            facingRight: true,
            frame: 0,
            frameTimer: 0,
            dead: false,
            invincible: false,
            invincibleTimer: 0
        };

        // Camera
        let cameraX = 0;

        function resetGame() {
            score = 0;
            coins = 0;
            timeLeft = 300;
            gameOver = false;
            win = false;
            player.x = 100;
            player.y = 100;
            player.velX = 0;
            player.velY = 0;
            player.dead = false;
            player.invincible = false;
            cameraX = 0;
            parseLevel();
            updateUI();
            
            if (timerInterval) clearInterval(timerInterval);
            timerInterval = setInterval(() => {
                if (!gameOver && !win && timeLeft > 0) {
                    timeLeft--;
                    updateUI();
                    if (timeLeft <= 0) {
                        die();
                    }
                }
            }, 1000);
        }

        function updateUI() {
            document.getElementById('score').textContent = score.toString().padStart(6, '0');
            document.getElementById('coins').textContent = coins.toString().padStart(2, '0');
            document.getElementById('time').textContent = timeLeft;
        }

        function die() {
            if (player.dead) return;
            player.dead = true;
            player.velY = -8;
            gameOver = true;
            setTimeout(() => {
                alert("GAME OVER\nPress SPACE to restart");
            }, 100);
        }

        function winGame() {
            if (win) return;
            win = true;
            gameOver = true;
            score += timeLeft * 50;
            updateUI();
            setTimeout(() => {
                alert("COURSE CLEAR!\nScore: " + score + "\nPress SPACE to restart");
            }, 100);
        }

        function checkCollision(rect1, rect2) {
            return rect1.x < rect2.x + rect2.width &&
                   rect1.x + rect1.width > rect2.x &&
                   rect1.y < rect2.y + rect2.height &&
                   rect1.y + rect1.height > rect2.y;
        }

        function getTileAt(x, y) {
            const col = Math.floor(x / TILE_SIZE);
            const row = Math.floor(y / TILE_SIZE);
            if (row >= 0 && row < tiles.length && col >= 0 && col < tiles[0].length) {
                return { type: tiles[row][col], row, col };
            }
            return { type: 0, row, col };
        }

        function hitBlock(row, col) {
            const tile = tiles[row][col];
            if (tile === 2) { // Brick
                tiles[row][col] = 0; // Remove brick
                score += 50;
                // Create particles
                for (let i = 0; i < 4; i++) {
                    particles.push({
                        x: col * TILE_SIZE,
                        y: row * TILE_SIZE,
                        velX: (Math.random() - 0.5) * 4,
                        velY: (Math.random() - 0.5) * 4 - 2,
                        life: 30,
                        color: '#b84e00'
                    });
                }
            } else if (tile === 3) { // Question block
                tiles[row][col] = 10; // Empty block
                score += 100;
                coins++;
                // Create coin particle
                particles.push({
                    x: col * TILE_SIZE + TILE_SIZE/2,
                    y: row * TILE_SIZE,
                    velX: 0,
                    velY: -6,
                    life: 20,
                    color: '#ffd700',
                    isCoin: true
                });
            }
            updateUI();
        }

        function update() {
            if (gameOver && !player.dead) return;
            
            // Player movement
            if (!player.dead) {
                if (keys.left) {
                    player.velX = -MOVE_SPEED;
                    player.facingRight = false;
                } else if (keys.right) {
                    player.velX = MOVE_SPEED;
                    player.facingRight = true;
                } else {
                    player.velX = 0;
                }
                
                player.velY += GRAVITY;
                if (player.velY > MAX_FALL_SPEED) player.velY = MAX_FALL_SPEED;
            } else {
                player.velY += GRAVITY;
            }
            
            // Apply velocity
            player.x += player.velX;
            player.y += player.velY;
            
            // Collision detection with tiles
            const playerRect = {
                x: player.x,
                y: player.y,
                width: player.width,
                height: player.height
            };
            
            // Check horizontal collisions
            if (player.velX !== 0) {
                const checkX = player.velX > 0 ? player.x + player.width : player.x;
                const topLeft = getTileAt(checkX, player.y);
                const bottomLeft = getTileAt(checkX, player.y + player.height - 1);
                
                if (topLeft.type > 0 && topLeft.type < 8 || bottomLeft.type > 0 && bottomLeft.type < 8) {
                    if (player.velX > 0) {
                        player.x = topLeft.col * TILE_SIZE - player.width;
                    } else {
                        player.x = (topLeft.col + 1) * TILE_SIZE;
                    }
                    player.velX = 0;
                }
            }
            
            // Check vertical collisions
            if (player.velY !== 0) {
                if (player.velY > 0) { // Falling
                    const bottomLeft = getTileAt(player.x, player.y + player.height);
                    const bottomRight = getTileAt(player.x + player.width - 1, player.y + player.height);
                    
                    if ((bottomLeft.type > 0 && bottomLeft.type < 8) || (bottomRight.type > 0 && bottomRight.type < 8)) {
                        player.y = bottomLeft.row * TILE_SIZE - player.height;
                        player.velY = 0;
                        player.jumping = false;
                    }
                } else { // Jumping
                    const topLeft = getTileAt(player.x, player.y);
                    const topRight = getTileAt(player.x + player.width - 1, player.y);
                    
                    if ((topLeft.type > 0 && topLeft.type < 8) || (topRight.type > 0 && topRight.type < 8)) {
                        player.y = (topLeft.row + 1) * TILE_SIZE;
                        player.velY = 0;
                        // Hit the block
                        if (topLeft.type > 0) hitBlock(topLeft.row, topLeft.col);
                        else if (topRight.type > 0) hitBlock(topRight.row, topRight.col);
                    }
                }
            }
            
            // Check boundaries
            if (player.x < 0) player.x = 0;
            if (player.y > canvas.height) {
                die();
            }
            
            // Update enemies
            enemies.forEach(enemy => {
                if (enemy.dead) {
                    enemy.y += 2; // Fall down
                    return;
                }
                
                enemy.velY = (enemy.velY || 0) + GRAVITY;
                enemy.x += enemy.velX;
                enemy.y += enemy.velY;
                
                // Enemy collision with tiles
                const enemyBottom = getTileAt(enemy.x + enemy.width/2, enemy.y + enemy.height);
                if (enemyBottom.type > 0 && enemyBottom.type < 8) {
                    enemy.y = enemyBottom.row * TILE_SIZE - enemy.height;
                    enemy.velY = 0;
                }
                
                const enemyLeft = getTileAt(enemy.x, enemy.y + enemy.height/2);
                const enemyRight = getTileAt(enemy.x + enemy.width, enemy.y + enemy.height/2);
                if ((enemyLeft.type > 0 && enemyLeft.type < 8) || (enemyRight.type > 0 && enemyRight.type < 8)) {
                    enemy.velX *= -1;
                }
                
                // Player-enemy collision
                if (!player.dead && !enemy.dead) {
                    const playerRect = { x: player.x, y: player.y, width: player.width, height: player.height };
                    const enemyRect = { x: enemy.x, y: enemy.y, width: enemy.width, height: enemy.height };
                    
                    if (checkCollision(playerRect, enemyRect)) {
                        // Check if player is stomping
                        if (player.velY > 0 && player.y + player.height < enemy.y + enemy.height/2) {
                            enemy.dead = true;
                            player.velY = -6; // Bounce
                            score += 100;
                            updateUI();
                            // Create particles
                            for (let i = 0; i < 4; i++) {
                                particles.push({
                                    x: enemy.x + enemy.width/2,
                                    y: enemy.y + enemy.height/2,
                                    velX: (Math.random() - 0.5) * 4,
                                    velY: (Math.random() - 0.5) * 4 - 2,
                                    life: 20,
                                    color: '#8b4513'
                                });
                            }
                        } else {
                            die();
                        }
                    }
                }
            });
            
            // Update items
            items.forEach(item => {
                if (item.collected) return;
                
                const playerRect = { x: player.x, y: player.y, width: player.width, height: player.height };
                const itemRect = { x: item.x - item.width/2, y: item.y - item.height/2, width: item.width, height: item.height };
                
                if (checkCollision(playerRect, itemRect)) {
                    item.collected = true;
                    coins++;
                    score += 200;
                    updateUI();
                }
            });
            
            // Update particles
            particles.forEach((particle, index) => {
                particle.x += particle.velX;
                particle.y += particle.velY;
                particle.velY += 0.2;
                particle.life--;
                if (particle.life <= 0) {
                    particles.splice(index, 1);
                }
            });
            
            // Check win condition
            if (player.x > flagX && !win) {
                winGame();
            }
            
            // Update camera
            const targetCameraX = player.x - canvas.width / 3;
            if (targetCameraX > cameraX) {
                cameraX = targetCameraX;
            }
            if (cameraX < 0) cameraX = 0;
            if (cameraX > (tiles[0].length * TILE_SIZE) - canvas.width) {
                cameraX = (tiles[0].length * TILE_SIZE) - canvas.width;
            }
            
            // Animation frame
            if (Math.abs(player.velX) > 0.5 && !player.jumping && !player.dead) {
                player.frameTimer++;
                if (player.frameTimer > 8) {
                    player.frame = (player.frame + 1) % 3;
                    player.frameTimer = 0;
                }
            } else {
                player.frame = 0;
            }
        }

        function draw() {
            // Clear canvas
            ctx.fillStyle = '#5c94fc';
            ctx.fillRect(0, 0, canvas.width, canvas.height);
            
            ctx.save();
            ctx.translate(-cameraX, 0);
            
            // Draw tiles
            for (let row = 0; row < tiles.length; row++) {
                for (let col = 0; col < tiles[row].length; col++) {
                    const tile = tiles[row][col];
                    const x = col * TILE_SIZE;
                    const y = row * TILE_SIZE;
                    
                    if (tile === 1) { // Ground
                        ctx.fillStyle = '#b84e00';
                        ctx.fillRect(x, y, TILE_SIZE, TILE_SIZE);
                        ctx.fillStyle = '#ff985f';
                        ctx.fillRect(x + 2, y + 2, TILE_SIZE - 4, TILE_SIZE - 4);
                    } else if (tile === 2) { // Brick
                        ctx.fillStyle = '#b84e00';
                        ctx.fillRect(x, y, TILE_SIZE, TILE_SIZE);
                        ctx.fillStyle = '#000';
                        ctx.fillRect(x, y + 8, TILE_SIZE, 2);
                        ctx.fillRect(x, y + 24, TILE_SIZE, 2);
                        ctx.fillRect(x + 16, y, 2, 8);
                        ctx.fillRect(x + 8, y + 8, 2, 16);
                        ctx.fillRect(x + 24, y + 8, 2, 16);
                    } else if (tile === 3) { // Question block
                        ctx.fillStyle = '#ffd700';
                        ctx.fillRect(x, y, TILE_SIZE, TILE_SIZE);
                        ctx.fillStyle = '#000';
                        ctx.font = 'bold 20px monospace';
                        ctx.fillText('?', x + 10, y + 24);
                    } else if (tile === 4) { // Pipe left
                        ctx.fillStyle = '#00aa00';
                        ctx.fillRect(x, y, TILE_SIZE, TILE_SIZE);
                        ctx.fillStyle = '#00dd00';
                        ctx.fillRect(x + 4, y, 8, TILE_SIZE);
                    } else if (tile === 5) { // Pipe right
                        ctx.fillStyle = '#00aa00';
                        ctx.fillRect(x, y, TILE_SIZE, TILE_SIZE);
                        ctx.fillStyle = '#00dd00';
                        ctx.fillRect(x + 4, y, 8, TILE_SIZE);
                    } else if (tile === 8) { // Flag pole
                        ctx.fillStyle = '#fff';
                        ctx.fillRect(x + 14, y, 4, TILE_SIZE);
                    } else if (tile === 9) { // Castle
                        ctx.fillStyle = '#b84e00';
                        ctx.fillRect(x, y, TILE_SIZE, TILE_SIZE);
                    } else if (tile === 10) { // Empty block
                        ctx.fillStyle = '#8b4513';
                        ctx.fillRect(x, y, TILE_SIZE, TILE_SIZE);
                    }
                }
            }
            
            // Draw items
            items.forEach(item => {
                if (item.collected) return;
                ctx.fillStyle = '#ffd700';
                ctx.beginPath();
                ctx.arc(item.x, item.y, 10, 0, Math.PI * 2);
                ctx.fill();
                ctx.fillStyle = '#000';
                ctx.font = '12px monospace';
                ctx.fillText('$', item.x - 4, item.y + 4);
            });
            
            // Draw enemies
            enemies.forEach(enemy => {
                if (enemy.dead) {
                    ctx.fillStyle = '#8b4513';
                    ctx.fillRect(enemy.x, enemy.y + enemy.height/2, enemy.width, enemy.height/2);
                } else {
                    ctx.fillStyle = '#8b4513';
                    ctx.fillRect(enemy.x, enemy.y, enemy.width, enemy.height);
                    // Eyes
                    ctx.fillStyle = '#fff';
                    ctx.fillRect(enemy.x + 4, enemy.y + 8, 6, 6);
                    ctx.fillRect(enemy.x + 20, enemy.y + 8, 6, 6);
                    ctx.fillStyle = '#000';
                    ctx.fillRect(enemy.x + 6, enemy.y + 10, 2, 2);
                    ctx.fillRect(enemy.x + 22, enemy.y + 10, 2, 2);
                }
            });
            
            // Draw particles
            particles.forEach(particle => {
                ctx.fillStyle = particle.color;
                if (particle.isCoin) {
                    ctx.beginPath();
                    ctx.arc(particle.x, particle.y, 8, 0, Math.PI * 2);
                    ctx.fill();
                    ctx.fillStyle = '#000';
                    ctx.font = '10px monospace';
                    ctx.fillText('$', particle.x - 3, particle.y + 3);
                } else {
                    ctx.fillRect(particle.x, particle.y, 6, 6);
                }
            });
            
            // Draw player (Mario)
            if (!player.dead || Math.floor(Date.now() / 100) % 2 === 0) {
                ctx.fillStyle = '#ff0000'; // Red hat/shirt
                ctx.fillRect(player.x, player.y, player.width, player.height);
                
                // Face
                ctx.fillStyle = '#ffcc99';
                if (player.facingRight) {
                    ctx.fillRect(player.x + 18, player.y + 4, 8, 10);
                } else {
                    ctx.fillRect(player.x + 2, player.y + 4, 8, 10);
                }
                
                // Overalls
                ctx.fillStyle = '#0000ff';
                ctx.fillRect(player.x + 4, player.y + 20, player.width - 8, 12);
                
                // Animation frames for walking
                if (player.frame === 1 && Math.abs(player.velX) > 0.5) {
                    ctx.fillStyle = '#ff0000';
                    if (player.facingRight) {
                        ctx.fillRect(player.x + 20, player.y + 32, 8, 4);
                    } else {
                        ctx.fillRect(player.x, player.y + 32, 8, 4);
                    }
                } else if (player.frame === 2 && Math.abs(player.velX) > 0.5) {
                    ctx.fillStyle = '#ff0000';
                    if (player.facingRight) {
                        ctx.fillRect(player.x + 4, player.y + 32, 8, 4);
                    } else {
                        ctx.fillRect(player.x + 16, player.y + 32, 8, 4);
                    }
                }
            }
            
            // Draw flag
            ctx.fillStyle = '#00aa00';
            ctx.beginPath();
            ctx.moveTo(flagX + 18, 10 * TILE_SIZE);
            ctx.lineTo(flagX + 50, 12 * TILE_SIZE);
            ctx.lineTo(flagX + 18, 14 * TILE_SIZE);
            ctx.fill();
            
            ctx.restore();
            
            // Game over overlay
            if (gameOver) {
                ctx.fillStyle = 'rgba(0, 0, 0, 0.7)';
                ctx.fillRect(0, 0, canvas.width, canvas.height);
                ctx.fillStyle = '#fff';
                ctx.font = '40px monospace';
                ctx.textAlign = 'center';
                if (win) {
                    ctx.fillText('COURSE CLEAR!', canvas.width/2, canvas.height/2 - 20);
                } else {
                    ctx.fillText('GAME OVER', canvas.width/2, canvas.height/2 - 20);
                }
                ctx.font = '20px monospace';
                ctx.fillText('Press SPACE to restart', canvas.width/2, canvas.height/2 + 20);
                ctx.textAlign = 'left';
            }
        }

        function gameLoop(timestamp) {
            const deltaTime = timestamp - lastTime;
            lastTime = timestamp;
            
            update();
            draw();
            
            requestAnimationFrame(gameLoop);
        }

        // Initialize
        function init() {
            canvas.width = 800;
            canvas.height = 480;
            parseLevel();
            resetGame();
            requestAnimationFrame(gameLoop);
        }

        init();
    </script>
</body>
</html>
