<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>炫酷特效互动页面</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            overflow: hidden;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            font-family: 'Arial', sans-serif;
            height: 100vh;
            cursor: none;
        }

        #canvas {
            position: fixed;
            top: 0;
            left: 0;
            z-index: 1;
        }

        .cursor {
            position: fixed;
            width: 20px;
            height: 20px;
            border: 2px solid rgba(255, 255, 255, 0.8);
            border-radius: 50%;
            pointer-events: none;
            z-index: 9999;
            transform: translate(-50%, -50%);
            transition: all 0.1s ease;
            box-shadow: 0 0 20px rgba(255, 255, 255, 0.5);
        }

        .cursor-dot {
            position: fixed;
            width: 8px;
            height: 8px;
            background: rgba(255, 255, 255, 0.9);
            border-radius: 50%;
            pointer-events: none;
            z-index: 10000;
            transform: translate(-50%, -50%);
        }

        .content {
            position: relative;
            z-index: 10;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            height: 100vh;
            color: white;
            text-align: center;
            pointer-events: none;
        }

        .title {
            font-size: 4rem;
            font-weight: bold;
            text-shadow: 0 0 30px rgba(255, 255, 255, 0.5);
            animation: glow 2s ease-in-out infinite alternate;
            margin-bottom: 20px;
            background: linear-gradient(45deg, #fff, #f0f0f0, #fff);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
        }

        .subtitle {
            font-size: 1.5rem;
            opacity: 0.9;
            max-width: 600px;
            line-height: 1.6;
            text-shadow: 0 2px 10px rgba(0, 0, 0, 0.3);
        }

        @keyframes glow {
            from {
                text-shadow: 0 0 20px rgba(255, 255, 255, 0.3), 0 0 30px rgba(255, 255, 255, 0.2);
            }
            to {
                text-shadow: 0 0 30px rgba(255, 255, 255, 0.6), 0 0 40px rgba(255, 255, 255, 0.4), 0 0 50px rgba(255, 255, 255, 0.3);
            }
        }

        .floating-shapes {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            pointer-events: none;
            z-index: 2;
        }

        .shape {
            position: absolute;
            border-radius: 50%;
            background: rgba(255, 255, 255, 0.1);
            animation: float 15s infinite linear;
        }

        @keyframes float {
            0% {
                transform: translateY(100vh) rotate(0deg);
                opacity: 0;
            }
            10% {
                opacity: 1;
            }
            90% {
                opacity: 1;
            }
            100% {
                transform: translateY(-100px) rotate(720deg);
                opacity: 0;
            }
        }

        .click-effect {
            position: fixed;
            border-radius: 50%;
            background: radial-gradient(circle, rgba(255,255,255,0.8) 0%, rgba(255,255,255,0) 70%);
            pointer-events: none;
            z-index: 9998;
            animation: clickExpand 0.6s ease-out forwards;
        }

        @keyframes clickExpand {
            0% {
                transform: translate(-50%, -50%) scale(0);
                opacity: 1;
            }
            100% {
                transform: translate(-50%, -50%) scale(3);
                opacity: 0;
            }
        }

        .info-panel {
            position: fixed;
            bottom: 30px;
            right: 30px;
            background: rgba(255, 255, 255, 0.1);
            backdrop-filter: blur(10px);
            padding: 20px;
            border-radius: 15px;
            color: white;
            z-index: 100;
            border: 1px solid rgba(255, 255, 255, 0.2);
            max-width: 300px;
            animation: slideIn 1s ease-out;
        }

        @keyframes slideIn {
            from {
                transform: translateX(100px);
                opacity: 0;
            }
            to {
                transform: translateX(0);
                opacity: 1;
            }
        }

        .info-panel h3 {
            margin-bottom: 10px;
            font-size: 1.2rem;
        }

        .info-panel p {
            font-size: 0.9rem;
            line-height: 1.5;
            opacity: 0.9;
        }

        .counter {
            position: fixed;
            top: 30px;
            left: 30px;
            background: rgba(255, 255, 255, 0.1);
            backdrop-filter: blur(10px);
            padding: 15px 25px;
            border-radius: 25px;
            color: white;
            z-index: 100;
            border: 1px solid rgba(255, 255, 255, 0.2);
            font-size: 1.1rem;
            animation: fadeIn 1s ease-out;
        }

        @keyframes fadeIn {
            from {
                opacity: 0;
                transform: translateY(-20px);
            }
            to {
                opacity: 1;
                transform: translateY(0);
            }
        }
    </style>
</head>
<body>
    <canvas id="canvas"></canvas>
    
    <div class="cursor"></div>
    <div class="cursor-dot"></div>
    
    <div class="floating-shapes" id="shapes"></div>
    
    <div class="content">
        <h1 class="title">✨ 魔法互动空间 ✨</h1>
        <p class="subtitle">移动鼠标探索粒子世界 • 点击创造涟漪效果 • 享受视觉盛宴</p>
    </div>
    
    <div class="counter">
        粒子数量: <span id="particleCount">0</span>
    </div>
    
    <div class="info-panel">
        <h3>🎮 互动指南</h3>
        <p>• 移动鼠标：粒子会跟随你的轨迹</p>
        <p>• 点击鼠标：产生炫丽涟漪效果</p>
        <p>• 静静观察：享受自动动画之美</p>
    </div>

    <script>
        // Canvas 设置
        const canvas = document.getElementById('canvas');
        const ctx = canvas.getContext('2d');
        canvas.width = window.innerWidth;
        canvas.height = window.innerHeight;

        // 自定义光标
        const cursor = document.querySelector('.cursor');
        const cursorDot = document.querySelector('.cursor-dot');
        
        document.addEventListener('mousemove', (e) => {
            cursor.style.left = e.clientX + 'px';
            cursor.style.top = e.clientY + 'px';
            cursorDot.style.left = e.clientX + 'px';
            cursorDot.style.top = e.clientY + 'px';
        });

        document.addEventListener('mousedown', () => {
            cursor.style.transform = 'translate(-50%, -50%) scale(0.8)';
            createClickEffect(e.clientX, e.clientY);
        });

        document.addEventListener('mouseup', () => {
            cursor.style.transform = 'translate(-50%, -50%) scale(1)';
        });

        // 点击效果
        function createClickEffect(x, y) {
            const effect = document.createElement('div');
            effect.className = 'click-effect';
            effect.style.left = x + 'px';
            effect.style.top = y + 'px';
            effect.style.width = '50px';
            effect.style.height = '50px';
            document.body.appendChild(effect);
            
            setTimeout(() => {
                effect.remove();
            }, 600);
        }

        // 粒子系统
        class Particle {
            constructor(x, y) {
                this.x = x;
                this.y = y;
                this.size = Math.random() * 3 + 1;
                this.speedX = Math.random() * 3 - 1.5;
                this.speedY = Math.random() * 3 - 1.5;
                this.color = `hsla(${Math.random() * 360}, 100%, 70%, 0.8)`;
                this.life = 100;
                this.maxLife = 100;
            }

            update() {
                this.x += this.speedX;
                this.y += this.speedY;
                this.life -= 0.5;
                
                if (this.size > 0.2) this.size -= 0.02;
                
                // 重力效果
                this.speedY += 0.02;
                
                // 边界检测
                if (this.x < 0 || this.x > canvas.width) this.speedX *= -1;
                if (this.y < 0 || this.y > canvas.height) this.speedY *= -1;
            }

            draw() {
                ctx.fillStyle = this.color;
                ctx.beginPath();
                ctx.arc(this.x, this.y, this.size, 0, Math.PI * 2);
                ctx.fill();
                
                // 添加光晕效果
                ctx.shadowBlur = 10;
                ctx.shadowColor = this.color;
            }
        }

        let particles = [];
        const maxParticles = 300;

        function handleParticles() {
            for (let i = 0; i < particles.length; i++) {
                particles[i].update();
                particles[i].draw();
                
                if (particles[i].life <= 0 || particles[i].size <= 0.2) {
                    particles.splice(i, 1);
                    i--;
                }
            }
        }

        // 鼠标移动产生粒子
        let lastMouseX = 0;
        let lastMouseY = 0;
        
        document.addEventListener('mousemove', (e) => {
            const distance = Math.hypot(e.clientX - lastMouseX, e.clientY - lastMouseY);
            
            if (distance > 5) {
                for (let i = 0; i < 2; i++) {
                    if (particles.length < maxParticles) {
                        particles.push(new Particle(e.clientX, e.clientY));
                    }
                }
            }
            
            lastMouseX = e.clientX;
            lastMouseY = e.clientY;
        });

        // 点击产生更多粒子
        document.addEventListener('click', (e) => {
            for (let i = 0; i < 20; i++) {
                if (particles.length < maxParticles) {
                    const particle = new Particle(e.clientX, e.clientY);
                    particle.speedX = Math.random() * 8 - 4;
                    particle.speedY = Math.random() * 8 - 4;
                    particle.size = Math.random() * 5 + 2;
                    particles.push(particle);
                }
            }
        });

        // 创建浮动形状
        function createFloatingShapes() {
            const shapesContainer = document.getElementById('shapes');
            const shapeCount = 15;
            
            for (let i = 0; i < shapeCount; i++) {
                const shape = document.createElement('div');
                shape.className = 'shape';
                
                const size = Math.random() * 100 + 50;
                shape.style.width = size + 'px';
                shape.style.height = size + 'px';
                shape.style.left = Math.random() * 100 + '%';
                shape.style.animationDelay = Math.random() * 15 + 's';
                shape.style.animationDuration = (Math.random() * 10 + 10) + 's';
                
                shapesContainer.appendChild(shape);
            }
        }

        // 更新粒子计数器
        function updateCounter() {
            document.getElementById('particleCount').textContent = particles.length;
        }

        // 动画循环
        function animate() {
            ctx.fillStyle = 'rgba(102, 126, 234, 0.1)';
            ctx.fillRect(0, 0, canvas.width, canvas.height);
            
            handleParticles();
            updateCounter();
            
            requestAnimationFrame(animate);
        }

        // 窗口大小调整
        window.addEventListener('resize', () => {
            canvas.width = window.innerWidth;
            canvas.height = window.innerHeight;
        });

        // 初始化
        createFloatingShapes();
        animate();

        // 自动产生一些初始粒子
        setInterval(() => {
            if (particles.length < 50) {
                const x = Math.random() * canvas.width;
                const y = Math.random() * canvas.height;
                for (let i = 0; i < 3; i++) {
                    particles.push(new Particle(x, y));
                }
            }
        }, 500);
    </script>
</body>
</html>
